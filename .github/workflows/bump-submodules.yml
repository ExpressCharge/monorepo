name: Bump submodules

on:
  schedule:
    - cron: '0 9 * * 1'  # weekly Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: pull latest main from each submodule
        run: |
          git submodule foreach --recursive 'git checkout main && git pull origin main'
      - name: detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: open PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bump-submodules/${{ github.run_id }}
          commit-message: 'chore: bump submodules'
          title: 'chore: bump submodules'
          body: |
            Automated bump of submodule pointers to latest `main`.

            Review the per-submodule diffs with `git diff --submodule=log` locally.
