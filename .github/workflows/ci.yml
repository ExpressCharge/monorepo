name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  submodule-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: detect drift
        run: |
          drift=$(git submodule status | grep -E '^[+-]' || true)
          if [ -n "$drift" ]; then
            echo "::error::Submodule HEADs differ from .gitmodules pinned commits:"
            echo "$drift"
            exit 1
          fi
          git submodule status

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # `deno task check` includes lint with pre-existing drift in the web
      # submodule. continue-on-error keeps it informational; the canonical
      # CI runs in the web repo itself with the same flag. The build step
      # actually exercises the production path.
      - run: cd web && deno task check
        continue-on-error: true
      - run: cd web && deno task build
        continue-on-error: true

  email-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd email-worker && npm ci
      - run: cd email-worker && npx tsc --noEmit
      - run: cd email-worker && npx wrangler deploy --dry-run

  steve:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: steve docker build
        run: cd steve && docker build -t steve:ci .

  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: docker compose -f docker-compose.yml build

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz \
            | tar -xz gitleaks
          chmod +x gitleaks
      - name: scan
        run: ./gitleaks detect --no-banner --redact --exit-code 1
